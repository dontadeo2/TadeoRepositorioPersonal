    <!-- Sección de Login -->
    <div class="login-section">
        <div class="container mt-5 mb-5">
            <div class="row align-items-center g-4">
                <!-- Columna Izquierda: Formulario -->
                <div class="col-lg-6">
                    <div class="login-card">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-dark">
                                👤 Inicia Sesión
                            </h2>
                            <p class="text-muted">Accede a tu cuenta para comprar componentes de calidad</p>
                        </div>

                        <form>
                            <div class="form-floating mb-">
                                <input type="email" class="form-control border-0 shadow-sm" id="floatingInput"
                                    placeholder="name@example.com" required>
                                <label for="floatingInput">
                                    Correo electrónico
                                </label>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="password" class="form-control border-0 shadow-sm" id="floatingPassword"
                                    placeholder="Password" required>
                                <label for="floatingPassword">
                                    Contraseña
                                </label>
                            </div>

                            <!--<div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="showPassword">

                                </label>

                            <!--<div class="form-check mb-4">

                                    Recuérdame en este dispositivo

                            </div>-->

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 shadow-sm">
                                ➜ Iniciar Sesión
                            </button>

                            <hr>

                                <p class="mb-2">¿No tienes cuenta?

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // Mostrar/Ocultar contraseña
        const showPasswordCheckbox = document.getElementById('showPassword');
        const passwordInput = document.getElementById('floatingPassword');

        showPasswordCheckbox.addEventListener('change', function () {
            if (this.checked) {
                passwordInput.type = 'text'; // Mostrar contraseña
            } else {
                passwordInput.type = 'password'; // Ocultar contraseña
            }
        });
    </script>
</body>
